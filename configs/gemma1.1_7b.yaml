# Training config for google/gemma-1.1-7b-it

model_id:     "google/gemma-1.1-7b-it"
dataset_path: "datasets/prepared/gemma"   # output of: python 2_prepare_dataset.py --model_type gemma-1.1

output_dir:   "./checkpoints/gemma1.1-7b"
report_to:    "wandb"

learning_rate:               2e-4
lr_scheduler_type:           "constant"
num_train_epochs:            2
per_device_train_batch_size: 1
gradient_accumulation_steps: 4
optim:                       adamw_torch
warmup_ratio:                0.03
max_grad_norm:               0.3

max_seq_length:          2048
gradient_checkpointing:  true

bf16:  true
tf32:  false

logging_steps:  10
save_strategy:  "epoch"
